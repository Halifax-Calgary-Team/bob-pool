services:
  db:
    image: postgres:15-alpine
    container_name: bobpool-db
    environment:
      POSTGRES_USER: bobpool
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: bobpool
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bobpool"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Containerfile
    container_name: bobpool-backend
    working_dir: /usr/src/app
    environment:
      # db config
      DB_HOST: db
      DB_USER: bobpool
      DB_PASSWORD: dev_password
      DB_NAME: bobpool
      DB_PORT: 5432

      # session config
      SESSION_SECRET: dev-secret-key
      
      # web service port
      PORT: 3001

      # node env
      NODE_ENV: development

      # IBM app id config
      # APPID_TENANT_ID:
      # APPID_CLIENT_ID:
      # APPID_SECRET:
      # APPID_OAUTH_SERVER_URL: https://ca-tor.appid.cloud.ibm.com/oauth/v4/d1844e9f-8bf3-447e-a70c-9dc22990c462
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules # hides host node_modules
      - backend_node_modules:/usr/src/node_modules # mounts container node_modules
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run migrate:up && npm run dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Containerfile
    container_name: bobpool-frontend
    working_dir: /usr/src/app
    environment:
      PORT: 3000
      BACKEND_PORT: 3001
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules # hides host node_modules
      - frontend_node_modules:/usr/src/node_modules # mounts container node_modules
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:

