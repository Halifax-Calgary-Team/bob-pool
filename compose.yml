services:
  db:
    image: postgres:15-alpine
    container_name: bobpool-db
    environment:
      POSTGRES_USER: bobpool
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: bobpool
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bobpool"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Containerfile
    container_name: bobpool-backend
    environment:
      DB_HOST: db
      DB_USER: bobpool
      DB_PASSWORD: dev_password
      DB_NAME: bobpool
      DB_PORT: 5432
      SESSION_SECRET: dev-secret-key
      NODE_ENV: development
      PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run migrate:up && npm run dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Containerfile
    container_name: bobpool-frontend
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host

volumes:
  postgres_data:

