# Production Docker Compose configuration for Bob Pool
# Uses distroless image for enhanced security

services:
  # PostgreSQL Database Service
  db:
    image: postgres:16-alpine
    container_name: bobpool-db-prod
    restart: unless-stopped
    
    environment:
      POSTGRES_USER: bobpool
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bobpool_prod}
      POSTGRES_DB: bobpool
    
    volumes:
      # Persist database data
      - postgres_data:/var/lib/postgresql/data
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bobpool"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    
    networks:
      - bobpool-network

  # Bob Pool Application Service (Distroless)
  app:
    build:
      context: .
      dockerfile: Containerfile.distroless
    container_name: bobpool-app-prod
    restart: unless-stopped
    
    ports:
      - "8080:8080"
    
    environment:
      # Node environment
      NODE_ENV: production
      PORT: 8080
      
      # Database configuration
      DB_HOST: db
      DB_USER: bobpool
      DB_PASSWORD: ${DB_PASSWORD:-bobpool_prod}
      DB_NAME: bobpool
      DB_PORT: 5432
      
      # Session secret (use strong secret in production)
      SESSION_SECRET: ${SESSION_SECRET:-change-this-in-production-use-strong-secret}
      
      # CORS configuration (comma-separated list of allowed origins)
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:8080}
    
    depends_on:
      db:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    networks:
      - bobpool-network

# Named volumes for data persistence
volumes:
  postgres_data:
    driver: local

# Network configuration
networks:
  bobpool-network:
    driver: bridge

# Made with Bob